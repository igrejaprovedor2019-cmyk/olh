<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS - FICHA OFICIAL</title>
    <style>
        /* ESTILO VISUAL */
        body { 
            background: #001c3d; /* Azul escuro Sirius */
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 110px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #ffcc00; }
        
        .container { 
            background: rgba(255, 255, 255, 0.08); 
            padding: 25px; border-radius: 20px; 
            width: 100%; max-width: 500px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* NAVEGAÇÃO */
        .step { display: none; }
        .step.active { display: block !important; }

        /* PERGUNTAS */
        h2 { color: #ffcc00; font-size: 18px; border-bottom: 1px solid #ffcc00; padding-bottom: 5px; margin-bottom: 15px; }
        label { display: block; margin: 12px 0 5px; font-size: 11px; text-transform: uppercase; font-weight: bold; color: #ddd; }
        input, select, textarea { 
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; 
            background: #050a14; color: white; margin-bottom: 5px; box-sizing: border-box;
        }
        .row { display: flex; gap: 10px; }
        
        /* BOTÕES */
        .btns { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .next { background: #ffcc00; color: #000; }
        .prev { background: #333; color: #fff; }
        .send { background: #25d366; color: #fff; box-shadow: 0 4px 10px rgba(37,211,102,0.4); }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.ibb.co/NdMBHN3N/Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019-1.jpg" class="logo">
    <h1 style="font-size: 20px; margin: 0;">CLUBE SIRIUS</h1>
</div>

<div class="container">
    <form id="formCompleto">
        
        <div class="step active">
            <h2>1. Dados Pessoais</h2>
            <label>Nome Completo:</label><input type="text" name="Nome" required>
            <label>Função:</label><input type="text" name="Funcao">
            <div class="row">
                <div style="flex:1"><label>Nascimento:</label><input type="date" name="Nascimento"></div>
                <div style="flex:1"><label>Sexo:</label><select name="Sexo"><option>Feminino</option><option>Masculino</option></select></div>
            </div>
            <label>Estado Civil:</label><input type="text" name="EstadoCivil">
            <label>Telefone / Celular:</label><input type="tel" name="Celular">
            <div class="btns"><button type="button" class="next" onclick="mudar(1)">Próximo</button></div>
        </div>

        <div class="step">
            <h2>2. Documentos e Local</h2>
            <div class="row">
                <div style="flex:1"><label>RG:</label><input type="text" name="RG"></div>
                <div style="flex:1"><label>Org. Expedidor:</label><input type="text" name="OrgExp"></div>
            </div>
            <label>CPF:</label><input type="text" name="CPF">
            <label>Endereço Completo:</label><input type="text" name="Endereco">
            <label>Bairro / CEP:</label><input type="text" name="Bairro_CEP">
            <label>Tamanho Camiseta:</label>
            <select name="Camiseta"><option>PP</option><option>P</option><option>M</option><option>G</option><option>GG</option></select>
            <div class="btns">
                <button type="button" class="prev" onclick="mudar(0)">Voltar</button>
                <button type="button" class="next" onclick="mudar(2)">Próximo</button>
            </div>
        </div>

        <div class="step">
            <h2>3. Escolaridade e Família</h2>
            <label>Escolaridade / Curso:</label><input type="text" name="Escolaridade">
            <label>Nome da Mãe:</label><input type="text" name="Mae">
            <label>Nome do Pai:</label><input type="text" name="Pai">
            <label>Contato Emergência:</label><input type="text" name="Emergencia">
            <div class="btns">
                <button type="button" class="prev" onclick="mudar(1)">Voltar</button>
                <button type="button" class="next" onclick="mudar(3)">Próximo</button>
            </div>
        </div>

        <div class="step">
            <h2>4. Ficha Médica</h2>
            <label>Nº Cartão SUS:</label><input type="text" name="SUS">
            <label>Tipo Sanguíneo / Fator RH:</label><input type="text" name="Sangue_RH">
            <label>Plano de Saúde:</label><input type="text" name="Plano">
            <label>Doenças (Catapora, Dengue, etc.):</label><textarea name="Doencas_Ja_Teve" rows="2" placeholder="Liste as doenças que já teve"></textarea>
            <label>Alergias / Remédios:</label><textarea name="Alergias_Remedios" rows="2"></textarea>
            <label>Cirurgias / Outros Problemas:</label><input type="text" name="Cirurgias">
            <div class="btns">
                <button type="button" class="prev" onclick="mudar(2)">Voltar</button>
                <button type="button" class="send" onclick="enviar()">Finalizar e Enviar</button>
            </div>
        </div>

    </form>
</div>

<script>
    const steps = document.querySelectorAll('.step');
    function mudar(idx) {
        steps.forEach(s => s.classList.remove('active'));
        steps[idx].classList.add('active');
        window.scrollTo(0,0);
    }

    function enviar() {
        const form = document.getElementById('formCompleto');
        const data = new FormData(form);
        let msg = "*NOVO CADASTRO CLUBE SIRIUS*%0A%0A";
        
        data.forEach((val, key) => {
            if(val) msg += `*${key}:* ${val}%0A`;
        });

        // Número do WhatsApp que você informou
        const phone = "559291404115";
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
