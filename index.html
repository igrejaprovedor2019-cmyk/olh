<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ficha Oficial SIRIUS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #001c3d; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f0f2f5; padding-bottom: 30px; }
        
        .header { background: var(--blue); color: white; padding: 30px; text-align: center; border-bottom: 5px solid var(--gold); }
        .header i { font-size: 50px; color: var(--gold); margin-bottom: 10px; }
        .header h1 { font-size: 18px; letter-spacing: 2px; }

        .container { max-width: 500px; margin: -20px auto 0; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
        
        .progress-container { padding: 20px 20px 0; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: var(--blue); height: 100%; width: 10%; transition: 0.4s; }
        .step-text { text-align: center; font-size: 12px; margin-top: 8px; font-weight: bold; color: #666; }

        form { padding: 20px; }
        .form-step { display: none; }
        .form-step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h2 { font-size: 15px; color: var(--blue); border-left: 4px solid var(--gold); padding-left: 10px; margin-bottom: 15px; text-transform: uppercase; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #444; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--blue); }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9f9f9; padding: 12px; border-radius: 8px; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 12px; }
        .checkbox-group input { width: auto; }

        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-next { background: var(--blue); color: white; }
        .btn-prev { background: #ddd; color: #333; }
        .btn-submit { background: #27ae60; color: white; font-size: 16px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; text-align: center; }
        #btn-confirm { background: #25d366; color: white; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <i class="fas fa-star"></i>
    <h1>FICHA DE CADASTRO SIRIUS</h1>
</div>

<div class="container">
    <div class="progress-container">
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div class="step-text">Etapa <span id="stepNow">1</span> de 10</div>
    </div>

    <form id="siriusForm">
        <div class="form-step active">
            <h2>👤 Identificação Inicial</h2>
            <div class="input-group"><label>Nome Completo:</label><input type="text" name="Nome Completo" required></div>
            <div class="grid-2">
                <div class="input-group"><label>Função:</label><input type="text" name="Função"></div>
                <div class="input-group"><label>Sexo:</label><select name="Sexo"><option>Feminino</option><option>Masculino</option></select></div>
            </div>
            <div class="grid-2">
                <div class="input-group"><label>Nascimento:</label><input type="date" name="Data de Nascimento"></div>
                <div class="input-group"><label>Estado Civil:</label><input type="text" name="Estado Civil"></div>
            </div>
            <div class="btn-group"><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>📞 Contatos</h2>
            <div class="grid-2">
                <div class="input-group"><label>Telefone (DDD):</label><input type="tel" name="Telefone"></div>
                <div class="input-group"><label>Celular (DDD):</label><input type="tel" name="Celular"></div>
            </div>
            <div class="input-group"><label>E-mail:</label><input type="email" name="E-mail"></div>
            <div class="input-group"><label>Batizado (IASD):</label><select name="Batizado IASD"><option>Sim</option><option>Não</option></select></div>
            <div class="btn-group"><button type="button" class="btn-prev">Voltar</button><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>🪪 Documentos</h2>
            <div class="grid-2">
                <div class="input-group"><label>RG:</label><input type="text" name="RG"></div>
                <div class="input-group"><label>Org. Expedidor:</label><input type="text" name="Org Expedidor"></div>
            </div>
            <div class="input-group"><label>CPF:</label><input type="text" name="CPF"></div>
            <div class="input-group"><label>Tamanho da Camiseta:</label><input type="text" name="Tam Camiseta"></div>
            <div class="input-group"><label>Nº Certidão de Nascimento:</label><input type="text" name="Certidao Nascimento"></div>
            <div class="btn-group"><button type="button" class="btn-prev">Voltar</button><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>🏠 Endereço</h2>
            <div class="input-group"><label>Endereço:</label><input type="text" name="Endereço"></div>
            <div class="grid-2">
                <div class="input-group"><label>Número:</label><input type="text" name="Número"></div>
                <div class="input-group"><label>Bairro:</label><input type="text" name="Bairro"></div>
            </div>
            <div class="grid-2">
                <div class="input-group"><label>Cidade:</label><input type="text" name="Cidade"></div>
                <div class="input-group"><label>Estado:</label><input type="text" name="Estado"></div>
            </div>
            <div class="input-group"><label>CEP:</label><input type="text" name="CEP"></div>
            <div class="btn-group"><button type="button" class="btn-prev">Voltar</button><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>🎓 Escolaridade</h2>
            <div class="input-group"><label>Nível de Escolaridade:</label>
                <select name="Nível Escolaridade">
                    <option>Ensino Fundamental</option><option>Ensino Médio</option>
                    <option>Ensino Técnico</option><option>Ensino Superior</option>
                    <option>Pós Graduação</option><option>Mestrado</option>
                </select>
            </div>
            <div class="input-group"><label>Status:</label><select name="Status Escolaridade"><option>Cursando</option><option>Completo</option><option>Incompleto</option></select></div>
            <div class="input-group"><label>Área de Conhecimento:</label><input type="text" name="Area Conhecimento"></div>
            <div class="input-group"><label>Instituição de Ensino:</label><input type="text" name="Instituição"></div>
            <div class="btn-group"><button type="button" class="btn-prev">Voltar</button><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>🏥 Saúde Profissional</h2>
            <div class="checkbox-group">
                <label><input type="checkbox" name="SaudeProf" value="Médico"> Médico</label>
                <label><input type="checkbox" name="SaudeProf" value="Enfermeiro"> Enfermeiro</label>
                <label><input type="checkbox" name="SaudeProf" value="Socorrista"> Socorrista</label>
                <label><input type="checkbox" name="SaudeProf" value="Psicólogo"> Psicólogo</label>
            </div>
            <h2 style="margin-top:20px;">👨‍👩‍👧 Responsáveis</h2>
            <div class="input-group"><label>Nome do Pai:</label><input type="text" name="Nome do Pai"></div>
            <div class="input-group"><label>Nome da Mãe:</label><input type="text" name="Nome da Mãe"></div>
            <div class="btn-group"><button type="button" class="btn-prev">Voltar</button><button type="button" class="btn-next">Próximo</button></div>
        </div>

        <div class="form-step">
            <h2>🚨 Contato de Emergência</h2>
            <div class="input-group"><label>Nome do Contato:</label><input type="text" name="Emergencia Nome
