<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS - FORMULÁRIO OFICIAL</title>
    <style>
        /* O FUNDO QUE VOCÊ AMOU EM TELA CHEIA */
        body { 
            margin: 0; padding: 0;
            background: #000 url('https://i.ibb.co/NdMBHN3N/Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019-1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        /* MÁSCARA ESCURA PARA AS PERGUNTAS FICAREM BEM VISÍVEIS */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 15, 0.88); z-index: 1;
        }

        .main-content { position: relative; z-index: 2; width: 95%; max-width: 600px; padding: 20px 0; }
        
        /* CABEÇALHO: LOGO REDONDA COM BRILHO */
        .header { text-align: center; margin-bottom: 25px; margin-top: 10px; }
        .logo-topo { 
            width: 140px; height: 140px; border-radius: 50%; 
            border: 3px solid #ffcc00; box-shadow: 0 0 25px rgba(255, 204, 0, 0.5); 
            object-fit: cover; background: #001c3d; 
        }

        /* ABAS ORGANIZADAS */
        .tabs { display: flex; gap: 5px; }
        .tab { 
            flex: 1; padding: 16px; background: rgba(20, 20, 20, 0.9); text-align: center; 
            cursor: pointer; font-weight: bold; border-radius: 12px 12px 0 0; 
            border: 1px solid #333; color: #777; font-size: 13px;
        }
        .tab.active { background: #ffcc00; color: #000; border-color: #ffcc00; }

        .container { 
            background: rgba(5, 10, 20, 0.97); padding: 25px; border-radius: 0 0 15px 15px; 
            border: 1px solid #ffcc00; border-top: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        /* TÍTULOS E CAMPOS */
        h2 { color: #ffcc00; font-size: 13px; text-transform: uppercase; border-left: 3px solid #ffcc00; padding-left: 10px; margin: 30px 0 15px; }
        .field { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; padding: 13px; border-radius: 8px; border: 1px solid #333; 
            background: rgba(0,0,0,0.6); color: white; box-sizing: border-box; font-size: 15px; outline: none;
        }
        input:focus { border-color: #ffcc00; background: #050505; }

        .row { display: flex; gap: 12px; }
        .row .field { flex: 1; }

        /* BOTÃO DO WHATSAPP */
        .final-btn { 
            width: 100%; padding: 20px; background: #25d366; color: white; 
            border: none; border-radius: 12px; font-size: 18px; font-weight: bold; 
            cursor: pointer; margin-top: 35px; text-transform: uppercase; transition: 0.3s;
        }
        .final-btn:hover { background: #1eb954; transform: scale(1.02); }

        .grid-doencas { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; 
        }
        .check-item { font-size: 13px; display: flex; align-items: center; gap: 8px; color: #ddd; }
        .check-item input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="main-content">
    <div class="header">
        <img src="https://i.ibb.co/NdMBHN3N/Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019-1.jpg" class="logo-topo">
    </div>

    <div class="tabs">
        <div class="tab active" onclick="mudar(0)">📝 INSCRIÇÃO</div>
        <div class="tab" onclick="mudar(1)">🩺 FICHA MÉDICA</div>
    </div>

    <div class="container">
        <form id="formSirius">
            
            <div class="section active" id="s0">
                <h2>👤 Dados do Membro</h2>
                <div class="field">
                    <label>Nome Completo:</label>
                    <input type="text" name="Nome_Membro" required>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Data de Nascimento:</label>
                        <input type="date" name="Nascimento">
                    </div>
                    <div class="field">
                        <label>Tamanho Camiseta:</label>
                        <input type="text" name="Camiseta" placeholder="Ex: P, M, 14">
                    </div>
                </div>

                <div class="field">
                    <label>Certidão de Nascimento (Termo/Folha/Livro):</label>
                    <input type="text" name="Certidao_Nasc">
                </div>

                <h2>👨‍👩‍👧 Responsáveis</h2>
                <div class="field">
                    <label>Nome do Pai:</label>
                    <input type="text" name="Nome_Pai">
                </div>
                <div class="field">
                    <label>Nome da Mãe:</label>
                    <input type="text" name="Nome_Mae">
                </div>

                <div class="row">
                    <div class="field">
                        <label>WhatsApp Contato:</label>
                        <input type="tel" name="WhatsApp_Resp" placeholder="(92) 9XXXX-XXXX">
                    </div>
                    <div class="field">
                        <label>E-mail:</label>
                        <input type="email" name="Email_Resp">
                    </div>
                </div>

                <h2>🏠 Endereço</h2>
                <div class="field">
                    <label>Endereço Residencial (Rua, Nº, Bairro):</label>
                    <input type="text" name="Endereco_Completo">
                </div>
            </div>

            <div class="section" id="s1">
                <h2>🩺 Saúde e Histórico</h2>
                <div class="row">
                    <div class="field">
                        <label>Nº Cartão SUS:</label>
                        <input type="text" name="Cartao_SUS">
                    </div>
                    <div class="field">
                        <label>Tipo Sanguíneo:</label>
                        <input type="text" name="Tipo_Sangue" placeholder="Ex: AB+">
                    </div>
                </div>

                <label style="margin-top:10px; display:block;">Já teve ou possui:</label>
                <div class="grid-doencas">
                    <label class="check-item"><input type="checkbox" name="d" value="Catapora"> Catapora</label>
                    <label class="check-item"><input type="checkbox" name="d" value="Asma"> Asma</label>
                    <label class="check-item"><input type="checkbox" name="d" value="Diabetes"> Diabetes</label>
                    <label class="check-item"><input type="checkbox" name="d" value="Alergia"> Alergia</label>
                </div>

                <div class="field" style="margin-top:20px;">
                    <label>Alergias/Remédios ou Observações:</label>
                    <textarea name="Obs_Saude" rows="4" placeholder="Descreva aqui detalhes importantes..."></textarea>
                </div>
            </div>

            <button type="button" class="final-btn" onclick="enviar()">Finalizar e Enviar via WhatsApp</button>
        </form>
    </div>
</div>

<script>
    function mudar(idx) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('s' + idx).classList.add('active');
        document.querySelectorAll('.tab')[idx].classList.add('active');
        window.scrollTo(0,0);
    }

    function enviar() {
        const form = document.getElementById('formSirius');
        const data = new FormData(form);
        let msg = "*NOVO CADASTRO CLUBE SIRIUS*%0A------------------------------%0A";
        
        let doencas = [];
        document.querySelectorAll('input[name="d"]:checked').forEach(i => doencas.push(i.value));

        for (let [key, val] of data.entries()) {
            if(val && key !== 'd') {
                msg += `*${key.replace('_', ' ')}:* ${val}%0A`;
            }
        }
        
        if(doencas.length > 0) msg += `%0A*HISTÓRICO SAÚDE:* ${doencas.join(", ")}`;

        const phone = "559291404115";
        window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
