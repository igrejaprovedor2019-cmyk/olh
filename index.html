<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS - FICHA OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CORES PREMIUM SIRIUS */
        :root { 
            --blue: #001c3d; 
            --gold: #ffcc00; 
            --dark-gold: #d4ac00;
            --white: #ffffff;
            --bg: #0b0e14;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

        body { 
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1a2a44, transparent);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 0 40px 0;
        }

        /* CABEÇALHO COM A SUA LOGO */
        .header { 
            text-align: center; 
            margin-bottom: 30px;
        }
        
        .logo-container img {
            max-width: 150px; /* Ajuste o tamanho da logo aqui */
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 204, 0, 0.4));
            margin-bottom: 10px;
        }

        .header h1 { 
            color: var(--white);
            font-size: 24px; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            font-weight: 800;
        }

        /* CONTAINER PRINCIPAL (ESTILO CARTÃO PREMIUM) */
        .container { 
            max-width: 500px; 
            width: 92%;
            margin: 0 auto; 
            background: #161b22; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* BARRA DE PROGRESSO */
        .prog-container { background: #0d1117; height: 8px; }
        .prog-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--gold), #fff); 
            width: 10%; 
            transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        form { padding: 35px 25px; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { 
            font-size: 16px; 
            color: var(--gold); 
            margin-bottom: 25px; 
            display: flex;
            align-items: center;
            gap: 12px;
            text-transform: uppercase;
        }

        /* INPUTS ESTILIZADOS */
        .field { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 11px; 
            font-weight: 600; 
            color: #8b949e; 
            text-transform: uppercase; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        input, select, textarea { 
            width: 100%; 
            padding: 15px; 
            border: 1px solid #30363d; 
            border-radius: 10px; 
            font-size: 15px; 
            background: #0d1117;
            color: white;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--gold); outline: none; background: #161b22; box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }

        /* OPÇÕES DE MARCAR (CHECKBOX/RADIO) */
        .opts { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            background: #0d1117; 
            padding: 18px; 
            border-radius: 10px;
            border: 1px solid #30363d;
        }

        .opts label { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-weight: 400; 
            text-transform: none; 
            font-size: 14px; 
            cursor: pointer;
            margin: 0;
            color: #c9d1d9;
        }

        .opts input[type="radio"], .opts input[type="checkbox"] { 
            width: 18px; 
            height: 18px; 
            accent-color: var(--gold);
        }

        /* BOTÕES */
        .btns { display: flex; gap: 12px; margin-top: 35px; }
        button { 
            flex: 1; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s ease;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .next { background: var(--blue); color: white; box-shadow: 0 5px 15px rgba(0,28,61,0.3); }
        .next:hover { transform: translateY(-3px); background: #002d62; box-shadow: 0 8px 20px rgba(0,28,61,0.5); }

        .prev { background: #30363d; color: #8b949e; }
        .prev:hover { background: #3a4149; color: white; }

        .send { 
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%); 
            color: white; 
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(39,174,96,0.3);
        }
        .send:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(39,174,96,0.5); }

        /* MODAL WHATSAPP */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,12,26,0.9); 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            backdrop-filter: blur(5px);
        }

        .m-box { 
            background: #161b22; 
            padding: 40px; 
            border-radius: 25px; 
            text-align: center; 
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,204,0,0.2);
        }

        .m-box i { font-size: 60px; color: #25d366; margin-bottom: 25px; filter: drop-shadow(0 0 10px rgba(37, 211, 102, 0.4));}
        .m-box h3 { margin-bottom: 15px; color: var(--gold); font-size: 20px; }
        .m-box p { font-size: 14px; color: #8b949e; margin-bottom: 30px; line-height: 1.6; }
    </style>
