<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRIUS - FICHA OFICIAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #001c3d; --gold: #ffcc00; --bg: #0b0e14; --card: #161b22; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); color: white; padding: 20px 0; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; margin-bottom: 10px; }
        
        .container { max-width: 500px; width: 95%; margin: 0 auto; background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #30363d; }
        .prog-bar { height: 6px; background: #0d1117; }
        .prog-fill { height: 100%; background: var(--gold); width: 10%; transition: 0.4s; }
        
        form { padding: 25px; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }

        h2 { color: var(--gold); font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #30363d; border-radius: 8px; background: #0d1117; color: white; }
        
        .btns { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .next { background: var(--blue); color: white; }
        .prev { background: #30363d; color: #ccc; }
        .send { background: #25d366; color: white; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://i.ibb.co/NdMBHN3N/Airbrush-IMAGE-ENHANCER-1772282903019-1772282903019-1.jpg" class="logo" alt="Logo">
    <h1>SIRIUS</h1>
</div>

<div class="container">
    <div class="prog-bar"><div class="prog-fill" id="bar"></div></div>
    <form id="fSirius">
        <div class="step active">
            <h2><i class="fas fa-user"></i> Dados Pessoais (1/10)</h2>
            <label>Nome Completo:</label><input type="text" name="Nome" required>
            <label>Função:</label><input type="text" name="Funcao">
            <label>Nascimento:</label><input type="date" name="Nascimento">
            <div class="btns"><button type="button" class="next" onclick="nextStep()">Próximo</button></div>
        </div>

        <div class="step">
            <h2><i class="fas fa-file-contract"></i> Documentos (2/10)</h2>
            <label>RG:</label><input type="text" name="RG">
            <label>CPF:</label><input type="text" name="CPF">
            <label>Título Eleitor:</label><input type="text" name="Titulo">
            <div class="btns">
                <button type="button" class="prev" onclick="prevStep()">Voltar</button>
                <button type="button" class="next" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step">
            <h2><i class="fas fa-map-marker-alt"></i> Endereço (3/10)</h2>
            <label>Rua/Nº:</label><input type="text" name="Endereco">
            <label>Bairro:</label><input type="text" name="Bairro">
            <label>CEP:</label><input type="text" name="CEP">
            <div class="btns">
                <button type="button" class="prev" onclick="prevStep()">Voltar</button>
                <button type="button" class="next" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step">
            <h2><i class="fas fa-heartbeat"></i> Ficha Médica (4/10)</h2>
            <label>Tipo Sanguíneo:</label>
            <select name="Sangue">
                <option value="A+">A+</option><option value="A-">A-</option>
                <option value="B+">B+</option><option value="B-">B-</option>
                <option value="AB+">AB+</option><option value="O+">O+</option>
            </select>
            <label>Possui Alergia? (Qual?):</label><input type="text" name="Alergia" placeholder="Se não, deixe em branco">
            <label>Problemas Cardíacos?</label><input type="text" name="Coracao">
            <div class="btns">
                <button type="button" class="prev" onclick="prevStep()">Voltar</button>
                <button type="button" class="next" onclick="nextStep()">Próximo</button>
            </div>
        </div>

        <div class="step" id="lastStep">
            <h2><i class="fas fa-check-circle"></i> Concluir (10/10)</h2>
            <p style="font-size: 13px; color: #8b949e; margin-bottom: 20px;">Ao clicar abaixo, seus dados serão enviados para o WhatsApp do Clube.</p>
            <div class="btns">
                <button type="button" class="prev" onclick="prevStep()">Voltar</button>
                <button type="button" class="send" onclick="sendWhatsApp()">FINALIZAR</button>
            </div>
        </div>
    </form>
</div>

<script>
    let currentStep = 0;
    const steps = document.querySelectorAll(".step");
    const bar = document.getElementById("bar");

    function nextStep() {
        steps[currentStep].classList.remove("active");
        currentStep++;
        if(currentStep >= steps.length) currentStep = steps.length - 1;
        steps[currentStep].classList.add("active");
        updateBar();
    }

    function prevStep() {
        steps[currentStep].classList.remove("active");
        currentStep--;
        if(currentStep < 0) currentStep = 0;
        steps[currentStep].classList.add("active");
        updateBar();
    }

    function updateBar() {
        let percent = ((currentStep + 1) / steps.length) * 100;
        bar.style.width = percent + "%";
    }

    function sendWhatsApp() {
        const form = document.getElementById("fSirius");
        const formData = new FormData(form);
        let message = "*NOVA FICHA - CLUBE SIRIUS*%0A%0A";
        
        for (let [key, value] of formData.entries()) {
            message += `*${key}:* ${value}%0A`;
        }

        const phone = "559291404115";
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }
</script>

</body>
</html>
